<div id="game-container">
<div class="flex flex-col min-h-full bg-black">
    <!-- Header -->
    <header class="flex items-center justify-between p-3 border-b border-white/10">
        <button
            hx-post="/reset"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="text-white text-sm px-3 py-1.5 rounded border border-white/10 bg-white/05">
            ← Back
        </button>
        <h1 class="font-bold text-white text-lg tracking-[0.15em] uppercase">Soc Ops</h1>
        <div class="w-16"></div>
    </header>

    <!-- Instructions -->
    <p class="text-center text-gray-500 text-sm py-2 px-4">
        Tap a square when you find someone who matches it.
    </p>

    <!-- Bingo indicator -->
    {% if session.has_bingo %}
    <div class="bg-neon-green text-black text-center py-2 font-semibold text-sm rounded-full mx-4">
        🎉 BINGO! You got a line!
    </div>
    {% endif %}

    <!-- Board -->
    <div class="flex-1 flex items-center justify-center p-3">
        {% include "components/bingo_board.html" %}
    </div>
</div>

{% if session.show_bingo_modal %}
    {% include "components/bingo_modal.html" %}
{% endif %}
</div>
