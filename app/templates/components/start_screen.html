<div id="game-container">
<div class="flex flex-col items-center justify-center min-h-full p-6 bg-black grid-bg">
    <!-- Animated hero section -->
    <div class="text-center max-w-2xl">
        <!-- Top accent line -->
        <div class="accent-line mb-8 w-32 mx-auto animate-fade-in delay-100"></div>
        
        <!-- Main logo/title with neon glow -->
        <h1 class="text-hero text-white glow-cyan animate-fade-in delay-200 animate-glow mb-3 tracking-widest">
            SOC OPS
        </h1>
        
        <!-- Subtitle description -->
        <p class="text-lg text-neon-cyan animate-fade-in delay-300 mb-12 font-light tracking-wide">SOCIAL BINGO FOR THE NEON ERA</p>
        
        <!-- Decorative minimal box -->
        <div class="bg-surface rounded-xl p-8 border border-neon-cyan/30 shadow-neon mb-8 animate-fade-in delay-400">
            <h2 class="font-bold text-white mb-4 text-lg tracking-wider">How to play</h2>
            <ul class="text-left text-gray-500 text-sm space-y-3 font-light">
                <li>▏ &nbsp; Find people who match the prompts.</li>
                <li>▏ &nbsp; Tap a square when you make a match.</li>
                <li>▏ &nbsp; Complete 5 in a row to score a win.</li>
            </ul>
        </div>

        <!-- Bottom accent line -->
        <div class="accent-line w-32 mx-auto mb-8 animate-fade-in delay-400"></div>

        <!-- Call to action button -->
        <button
            hx-post="/start"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="relative w-full sm:w-auto px-12 py-4 bg-neon-cyan text-black font-bold text-lg rounded-full transition-all shadow-sm hover:shadow-neon uppercase tracking-widest animate-fade-in delay-500">
            <span class="relative z-10">Start Game</span>
        </button>
    </div>
</div>
</div>
